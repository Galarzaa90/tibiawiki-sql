version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3"
  jobs:
    build:
      html:
        - zensical build --clean
        - mkdir -p $READTHEDOCS_OUTPUT/html
        - cp -r site/. $READTHEDOCS_OUTPUT/html/

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
